<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Smoke Tracker</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: var(--tg-theme-bg-color, #1a1a1a);
            color: var(--tg-theme-text-color, #ffffff);
            padding: 16px;
            min-height: 100vh;
        }

        .app {
            max-width: 400px;
            margin: 0 auto;
        }

        .card {
            background: var(--tg-theme-secondary-bg-color, #2c2c2e);
            border-radius: 16px;
            padding: 20px;
            margin-bottom: 16px;
        }

        /* Приветствие */
        .welcome {
            background: linear-gradient(135deg, #e74c3c, #c0392b);
            color: white;
        }

        .welcome h2 {
            font-size: 22px;
            margin-bottom: 8px;
        }

        .name-input-group {
            display: flex;
            gap: 8px;
            margin-top: 12px;
        }

        .name-input-group input {
            flex: 1;
            padding: 12px;
            border: none;
            border-radius: 8px;
            background: rgba(255,255,255,0.2);
            color: white;
            font-size: 16px;
        }

        .name-input-group input::placeholder {
            color: rgba(255,255,255,0.7);
        }

        .name-input-group button {
            padding: 12px 20px;
            border: none;
            border-radius: 8px;
            background: white;
            color: #e74c3c;
            font-weight: 600;
            cursor: pointer;
        }

        /* Таймер */
        .timer {
            text-align: center;
        }

        .timer-label {
            font-size: 14px;
            opacity: 0.7;
            margin-bottom: 8px;
        }

        .timer-display {
            font-size: 56px;
            font-weight: 700;
            font-family: monospace;
            color: #e74c3c;
            margin: 8px 0;
        }

        .timer-status {
            font-size: 14px;
            opacity: 0.8;
        }

        /* Счётчик */
        .counter-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .counter-info {
            flex: 1;
        }

        .counter-label {
            font-size: 14px;
            opacity: 0.7;
        }

        .counter-value {
            font-size: 48px;
            font-weight: 700;
            color: #e74c3c;
        }

        .counter-limit {
            font-size: 18px;
            opacity: 0.5;
        }

        .counter-buttons {
            display: flex;
            gap: 8px;
        }

        .btn-circle {
            width: 60px;
            height: 60px;
            border-radius: 30px;
            border: none;
            background: #e74c3c;
            color: white;
            font-size: 28px;
            font-weight: 600;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .btn-circle.reset {
            background: #3a3a3c;
            font-size: 24px;
        }

        .btn-circle:active {
            opacity: 0.7;
        }

        /* Прогресс */
        .progress-bar {
            height: 8px;
            background: rgba(255,255,255,0.1);
            border-radius: 4px;
            margin-top: 16px;
            overflow: hidden;
        }

        .progress-fill {
            height: 100%;
            background: #e74c3c;
            border-radius: 4px;
            width: 0%;
            transition: width 0.3s;
        }

        /* Настройки */
        .setting-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 16px;
        }

        .setting-label {
            font-size: 16px;
        }

        .setting-control {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .setting-control button {
            width: 40px;
            height: 40px;
            border-radius: 20px;
            border: none;
            background: #3a3a3c;
            color: white;
            font-size: 24px;
            cursor: pointer;
        }

        .setting-control span {
            font-size: 20px;
            font-weight: 600;
            min-width: 30px;
            text-align: center;
        }

        /* Экономия */
        .savings {
            display: flex;
            justify-content: space-around;
            text-align: center;
        }

        .savings-item {
            flex: 1;
        }

        .savings-value {
            font-size: 28px;
            font-weight: 700;
            color: #2ecc71;
        }

        .savings-label {
            font-size: 13px;
            opacity: 0.7;
        }

        /* Кнопки действий */
        .action-btn {
            width: 100%;
            padding: 16px;
            border: none;
            border-radius: 12px;
            background: #e74c3c;
            color: white;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            margin-bottom: 8px;
        }

        .action-btn.secondary {
            background: #3a3a3c;
        }

        .action-btn:active {
            opacity: 0.7;
        }

        /* Уведомление */
        .toast-message {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0,0,0,0.8);
            color: white;
            padding: 12px 24px;
            border-radius: 30px;
            font-size: 14px;
            z-index: 1000;
            opacity: 0;
            transition: opacity 0.3s;
        }

        .toast-message.show {
            opacity: 1;
        }
    </style>
</head>
<body>
    <div class="app">
        <!-- Приветствие и имя -->
        <div class="card welcome" id="welcomeCard">
            <h2>👋 Привет, <span id="displayName">Гость</span>!</h2>
            <p id="greetingMessage">Введите ваше имя</p>
            <div class="name-input-group">
                <input type="text" id="nameInput" placeholder="Ваше имя" maxlength="20">
                <button id="saveNameBtn">Сохранить</button>
            </div>
        </div>

        <!-- Таймер -->
        <div class="card timer">
            <div class="timer-label">⏱️ ВРЕМЯ БЕЗ СИГАРЕТ</div>
            <div class="timer-display" id="timerDisplay">00:00:00</div>
            <div class="timer-status" id="timerStatus">Нажмите +1 для старта</div>
        </div>

        <!-- Счётчик -->
        <div class="card">
            <div class="counter-row">
                <div class="counter-info">
                    <div class="counter-label">🚬 ВЫКУРЕНО СЕГОДНЯ</div>
                    <div>
                        <span class="counter-value" id="counter">0</span>
                        <span class="counter-limit" id="limitDisplay">/ 15</span>
                    </div>
                </div>
                <div class="counter-buttons">
                    <button class="btn-circle reset" id="resetBtn">↻</button>
                    <button class="btn-circle" id="addBtn">+</button>
                </div>
            </div>
            <div class="progress-bar">
                <div class="progress-fill" id="progressFill"></div>
            </div>
        </div>

        <!-- Экономия -->
        <div class="card">
            <div class="savings">
                <div class="savings-item">
                    <div class="savings-value" id="moneySaved">0 ₽</div>
                    <div class="savings-label">Сэкономлено</div>
                </div>
                <div class="savings-item">
                    <div class="savings-value" id="cigarettesSaved">0</div>
                    <div class="savings-label">Сигарет</div>
                </div>
                <div class="savings-item">
                    <div class="savings-value" id="lifeGained">0</div>
                    <div class="savings-label">Часов жизни</div>
                </div>
            </div>
        </div>

        <!-- Настройки -->
        <div class="card">
            <h3 style="margin-bottom: 16px;">⚙️ Настройки</h3>
            
            <div class="setting-row">
                <span class="setting-label">🎯 Дневной лимит</span>
                <div class="setting-control">
                    <button id="limitMinus">−</button>
                    <span id="limitValue">15</span>
                    <button id="limitPlus">+</button>
                </div>
            </div>

            <div class="setting-row">
                <span class="setting-label">💵 Цена пачки</span>
                <div class="setting-control">
                    <button id="priceMinus">−</button>
                    <span><span id="priceValue">200</span> ₽</span>
                    <button id="pricePlus">+</button>
                </div>
            </div>
        </div>

        <!-- Действия -->
        <button class="action-btn" id="syncBtn">🔄 Синхронизировать</button>
        <button class="action-btn secondary" id="resetAllBtn">🗑️ Сбросить всё</button>
    </div>

    <!-- Тосты -->
    <div class="toast-message" id="toast"></div>

    <script>
        // Инициализация Telegram
        const tg = window.Telegram.WebApp;
        tg.ready();
        tg.expand();

        // Данные приложения
        let appData = {
            userName: '',
            count: 0,
            limit: 15,
            packPrice: 200,
            lastSmokeTime: null,
            totalSmoked: 0
        };

        let timerInterval = null;

        // DOM элементы
        const displayName = document.getElementById('displayName');
        const greetingMessage = document.getElementById('greetingMessage');
        const nameInput = document.getElementById('nameInput');
        const timerDisplay = document.getElementById('timerDisplay');
        const timerStatus = document.getElementById('timerStatus');
        const counter = document.getElementById('counter');
        const limitDisplay = document.getElementById('limitDisplay');
        const limitValue = document.getElementById('limitValue');
        const priceValue = document.getElementById('priceValue');
        const progressFill = document.getElementById('progressFill');
        const moneySaved = document.getElementById('moneySaved');
        const cigarettesSaved = document.getElementById('cigarettesSaved');
        const lifeGained = document.getElementById('lifeGained');
        const toast = document.getElementById('toast');

        // Функция показа уведомления
        function showToastMessage(text, duration = 2000) {
            toast.textContent = text;
            toast.classList.add('show');
            setTimeout(() => {
                toast.classList.remove('show');
            }, duration);
        }

        // Загрузка данных
        async function loadData() {
            try {
                // Пробуем загрузить из облака Telegram
                const cloudData = await tg.CloudStorage.getItem('smokeAppData');
                if (cloudData) {
                    appData = { ...appData, ...JSON.parse(cloudData) };
                }
            } catch (e) {
                // Если облако недоступно, пробуем localStorage
                const localData = localStorage.getItem('smokeAppData');
                if (localData) {
                    appData = { ...appData, ...JSON.parse(localData) };
                }
            }

            // Если имя не задано, пробуем взять из Telegram
            if (!appData.userName && tg.initDataUnsafe?.user?.first_name) {
                appData.userName = tg.initDataUnsafe.user.first_name;
            }

            updateAllUI();
            startTimerIfNeeded();
        }

        // Сохранение данных
        async function saveData(showMessage = false) {
            const dataToSave = JSON.stringify(appData);
            localStorage.setItem('smokeAppData', dataToSave);
            
            try {
                await tg.CloudStorage.setItem('smokeAppData', dataToSave);
                if (showMessage) {
                    showToastMessage('✅ Данные синхронизированы');
                }
            } catch (e) {
                if (showMessage) {
                    showToastMessage('⚠️ Сохранено только локально');
                }
            }
        }

        // Обновление всего UI
        function updateAllUI() {
            // Имя
            if (appData.userName) {
                displayName.textContent = appData.userName;
                greetingMessage.textContent = `Удачи сегодня, ${appData.userName}!`;
                nameInput.value = appData.userName;
            } else {
                displayName.textContent = 'Гость';
                greetingMessage.textContent = 'Введите ваше имя';
            }

            // Счётчик
            counter.textContent = appData.count;
            limitDisplay.textContent = `/ ${appData.limit}`;
            limitValue.textContent = appData.limit;
            priceValue.textContent = appData.packPrice;

            // Прогресс
            const progress = (appData.count / appData.limit) * 100;
            progressFill.style.width = `${Math.min(progress, 100)}%`;

            // Экономия
            updateSavings();
        }

        // Обновление экономии
        function updateSavings() {
            const totalSmoked = appData.totalSmoked + appData.count;
            const pricePerCig = appData.packPrice / 20;
            const savedMoney = Math.round(totalSmoked * pricePerCig);
            const savedLife = Math.round(totalSmoked * 0.18 * 10) / 10;

            moneySaved.textContent = `${savedMoney} ₽`;
            cigarettesSaved.textContent = totalSmoked;
            lifeGained.textContent = savedLife;
        }

        // Таймер
        function startTimerIfNeeded() {
            if (appData.lastSmokeTime) {
                updateTimer();
                if (!timerInterval) {
                    timerInterval = setInterval(updateTimer, 1000);
                }
            }
        }

        function updateTimer() {
            if (!appData.lastSmokeTime) {
                timerDisplay.textContent = '00:00:00';
                timerStatus.textContent = 'Нажмите +1 для старта';
                return;
            }

            const diff = Math.floor((Date.now() - appData.lastSmokeTime) / 1000);
            const hours = Math.floor(diff / 3600);
            const minutes = Math.floor((diff % 3600) / 60);
            const seconds = diff % 60;

            timerDisplay.textContent = 
                `${String(hours).padStart(2, '0')}:${String(minutes).padStart(2, '0')}:${String(seconds).padStart(2, '0')}`;

            if (diff < 3600) {
                timerStatus.textContent = '🔥 Держитесь!';
            } else if (diff < 7200) {
                timerStatus.textContent = '💪 Хороший прогресс!';
            } else {
                timerStatus.textContent = '✨ Отлично!';
            }

            // Уведомление о 2 часах
            if (diff === 7200) {
                tg.showPopup({
                    title: '🎉 Отлично!',
                    message: 'Вы не курите уже 2 часа!',
                    buttons: [{type: 'ok'}]
                });
            }
        }

        function resetTimer() {
            appData.lastSmokeTime = Date.now();
            if (timerInterval) clearInterval(timerInterval);
            timerInterval = setInterval(updateTimer, 1000);
            updateTimer();
            saveData();
            
            if (tg.HapticFeedback) {
                tg.HapticFeedback.impactOccurred('medium');
            }
        }

        // Добавление сигареты
        function addSmoke() {
            appData.count++;
            appData.totalSmoked++;
            resetTimer();
            updateAllUI();
            saveData();

            if (tg.HapticFeedback) {
                tg.HapticFeedback.impactOccurred('light');
            }

            // Проверка лимита
            if (appData.count === appData.limit) {
                tg.showPopup({
                    title: '⚠️ Внимание',
                    message: 'Вы достигли дневного лимита!',
                    buttons: [{type: 'ok'}]
                });
            } else if (appData.count > appData.limit) {
                tg.showPopup({
                    title: '❌ Превышение',
                    message: `Лимит превышен на ${appData.count - appData.limit} сигарет`,
                    buttons: [{type: 'ok'}]
                });
            }
        }

        // Обработчики событий
        document.getElementById('saveNameBtn').addEventListener('click', () => {
            const newName = nameInput.value.trim();
            if (newName) {
                appData.userName = newName;
                updateAllUI();
                saveData();
                showToastMessage('✅ Имя сохранено');
            }
        });

        document.getElementById('addBtn').addEventListener('click', addSmoke);

        document.getElementById('resetBtn').addEventListener('click', () => {
            tg.showConfirm('Сбросить счётчик за сегодня?', (confirmed) => {
                if (confirmed) {
                    appData.count = 0;
                    updateAllUI();
                    saveData();
                    showToastMessage('🔄 Счётчик сброшен');
                }
            });
        });

        document.getElementById('limitMinus').addEventListener('click', () => {
            if (appData.limit > 1) {
                appData.limit--;
                updateAllUI();
                saveData();
            }
        });

        document.getElementById('limitPlus').addEventListener('click', () => {
            if (appData.limit < 100) {
                appData.limit++;
                updateAllUI();
                saveData();
            }
        });

        document.getElementById('priceMinus').addEventListener('click', () => {
            if (appData.packPrice > 10) {
                appData.packPrice -= 10;
                updateAllUI();
                updateSavings();
                saveData();
            }
        });

        document.getElementById('pricePlus').addEventListener('click', () => {
            appData.packPrice += 10;
            updateAllUI();
            updateSavings();
            saveData();
        });

        document.getElementById('syncBtn').addEventListener('click', () => {
            saveData(true);
        });

        document.getElementById('resetAllBtn').addEventListener('click', () => {
            tg.showConfirm('Удалить ВСЕ данные? Это нельзя отменить!', (confirmed) => {
                if (confirmed) {
                    appData = {
                        userName: appData.userName,
                        count: 0,
                        limit: 15,
                        packPrice: 200,
                        lastSmokeTime: null,
                        totalSmoked: 0
                    };
                    updateAllUI();
                    saveData();
                    showToastMessage('🗑️ Все данные сброшены');
                }
            });
        });

        // Главная кнопка
        tg.MainButton.text = 'ЗАКРЫТЬ';
        tg.MainButton.show();
        tg.MainButton.onClick(() => tg.close());

        // Запуск
        loadData();
    </script>
</body>
</html>
