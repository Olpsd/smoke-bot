<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Smoke Tracker</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: var(--tg-theme-bg-color, #1a1a1a);
            color: var(--tg-theme-text-color, #ffffff);
            padding: 16px;
            min-height: 100vh;
        }

        .app {
            max-width: 400px;
            margin: 0 auto;
        }

        .card {
            background: var(--tg-theme-secondary-bg-color, #2c2c2e);
            border-radius: 16px;
            padding: 20px;
            margin-bottom: 16px;
        }

        /* Приветствие */
        .welcome {
            background: linear-gradient(135deg, #e74c3c, #c0392b);
            color: white;
        }

        .welcome h2 {
            font-size: 22px;
            margin-bottom: 4px;
        }

        .welcome p {
            opacity: 0.9;
            font-size: 14px;
        }

        /* Таймер */
        .timer {
            text-align: center;
        }

        .timer-label {
            font-size: 14px;
            opacity: 0.7;
            margin-bottom: 8px;
        }

        .timer-display {
            font-size: 52px;
            font-weight: 700;
            font-family: monospace;
            color: #e74c3c;
            margin: 8px 0;
        }

        .timer-status {
            font-size: 14px;
            opacity: 0.8;
        }

        /* Счётчик */
        .counter-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .counter-info {
            flex: 1;
        }

        .counter-label {
            font-size: 14px;
            opacity: 0.7;
        }

        .counter-value {
            font-size: 48px;
            font-weight: 700;
            color: #e74c3c;
        }

        .counter-limit {
            font-size: 18px;
            opacity: 0.5;
        }

        .counter-buttons {
            display: flex;
            gap: 8px;
        }

        .btn-circle {
            width: 60px;
            height: 60px;
            border-radius: 30px;
            border: none;
            background: #e74c3c;
            color: white;
            font-size: 28px;
            font-weight: 600;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .btn-circle.reset {
            background: #3a3a3c;
            font-size: 24px;
        }

        .btn-circle:active {
            opacity: 0.7;
        }

        /* Прогресс */
        .progress-bar {
            height: 8px;
            background: rgba(255,255,255,0.1);
            border-radius: 4px;
            margin-top: 16px;
            overflow: hidden;
        }

        .progress-fill {
            height: 100%;
            background: #e74c3c;
            border-radius: 4px;
            width: 0%;
            transition: width 0.3s;
        }

        /* Экономия */
        .savings {
            display: flex;
            justify-content: space-around;
            text-align: center;
        }

        .savings-item {
            flex: 1;
        }

        .savings-value {
            font-size: 24px;
            font-weight: 700;
            color: #2ecc71;
        }

        .savings-label {
            font-size: 12px;
            opacity: 0.7;
        }

        /* Настройки */
        .setting-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 16px;
        }

        .setting-label {
            font-size: 16px;
        }

        .setting-control {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .setting-control button {
            width: 40px;
            height: 40px;
            border-radius: 20px;
            border: none;
            background: #3a3a3c;
            color: white;
            font-size: 24px;
            cursor: pointer;
        }

        .setting-control span {
            font-size: 20px;
            font-weight: 600;
            min-width: 40px;
            text-align: center;
        }

        .setting-control input {
            padding: 8px;
            border-radius: 8px;
            border: none;
            background: #3a3a3c;
            color: white;
            width: 150px;
        }

        /* Кнопки */
        .action-btn {
            width: 100%;
            padding: 16px;
            border: none;
            border-radius: 12px;
            background: #e74c3c;
            color: white;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            margin-bottom: 8px;
        }

        .action-btn.secondary {
            background: #3a3a3c;
        }

        .action-btn:active {
            opacity: 0.7;
        }

        /* Уведомление */
        .toast-message {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0,0,0,0.8);
            color: white;
            padding: 12px 24px;
            border-radius: 30px;
            font-size: 14px;
            z-index: 1000;
            opacity: 0;
            transition: opacity 0.3s;
        }

        .toast-message.show {
            opacity: 1;
        }
    </style>
</head>
<body>
    <div class="app">
        <!-- Приветствие -->
        <div class="card welcome">
            <h2>👋 Привет, <span id="userName">Гость</span>!</h2>
            <p id="greetingText">Загружаем данные...</p>
        </div>

        <!-- Таймер -->
        <div class="card timer">
            <div class="timer-label">⏱️ ВРЕМЯ БЕЗ СИГАРЕТ</div>
            <div class="timer-display" id="timerDisplay">00:00:00</div>
            <div class="timer-status" id="timerStatus">Нажмите +1 для старта</div>
        </div>

        <!-- Счётчик -->
        <div class="card">
            <div class="counter-row">
                <div class="counter-info">
                    <div class="counter-label">🚬 ВЫКУРЕНО СЕГОДНЯ</div>
                    <div>
                        <span class="counter-value" id="counter">0</span>
                        <span class="counter-limit" id="limitDisplay">/ 15</span>
                    </div>
                </div>
                <div class="counter-buttons">
                    <button class="btn-circle reset" id="resetBtn">↻</button>
                    <button class="btn-circle" id="addBtn">+</button>
                </div>
            </div>
            <div class="progress-bar">
                <div class="progress-fill" id="progressFill"></div>
            </div>
        </div>

        <!-- Экономия -->
        <div class="card">
            <div class="savings">
                <div class="savings-item">
                    <div class="savings-value" id="moneySaved">0 ₽</div>
                    <div class="savings-label">Сэкономлено</div>
                </div>
                <div class="savings-item">
                    <div class="savings-value" id="totalSmoked">0</div>
                    <div class="savings-label">Всего сигарет</div>
                </div>
                <div class="savings-item">
                    <div class="savings-value" id="lifeGained">0</div>
                    <div class="savings-label">Часов жизни</div>
                </div>
            </div>
        </div>

        <!-- Настройки -->
        <div class="card">
            <h3 style="margin-bottom: 16px;">⚙️ Настройки</h3>
            
            <div class="setting-row">
                <span class="setting-label">👤 Ваше имя</span>
                <div class="setting-control">
                    <input type="text" id="nameInput" placeholder="Введите имя" maxlength="20">
                    <button id="saveNameBtn" style="padding: 8px 16px; border-radius: 8px; border: none; background: #e74c3c; color: white; cursor: pointer;">✓</button>
                </div>
            </div>

            <div class="setting-row">
                <span class="setting-label">🎯 Дневной лимит</span>
                <div class="setting-control">
                    <button id="limitMinus">−</button>
                    <span id="limitValue">15</span>
                    <button id="limitPlus">+</button>
                </div>
            </div>

            <div class="setting-row">
                <span class="setting-label">💵 Цена пачки</span>
                <div class="setting-control">
                    <button id="priceMinus">−</button>
                    <span><span id="priceValue">200</span> ₽</span>
                    <button id="pricePlus">+</button>
                </div>
            </div>

            <button class="action-btn" id="syncBtn">🔄 Синхронизировать с сервером</button>
            <button class="action-btn secondary" id="resetAllBtn">🗑️ Сбросить всё</button>
        </div>
    </div>

    <!-- Тосты -->
    <div class="toast-message" id="toast"></div>

    <script>
        // ===== ИНИЦИАЛИЗАЦИЯ =====
        const tg = window.Telegram.WebApp;
        tg.ready();
        tg.expand();

        // Данные пользователя из Telegram
        const userData = {
            id: tg.initDataUnsafe?.user?.id || 0,
            username: tg.initDataUnsafe?.user?.username || '',
            first_name: tg.initDataUnsafe?.user?.first_name || 'Гость'
        };

        // Состояние приложения
        let appData = {
            userName: userData.first_name,
            count: 0,
            limit: 15,
            packPrice: 200,
            lastSmokeTime: null,
            totalSmoked: 0
        };

        let timerInterval = null;

        // DOM элементы
        const userNameSpan = document.getElementById('userName');
        const greetingText = document.getElementById('greetingText');
        const timerDisplay = document.getElementById('timerDisplay');
        const timerStatus = document.getElementById('timerStatus');
        const counter = document.getElementById('counter');
        const limitDisplay = document.getElementById('limitDisplay');
        const limitValue = document.getElementById('limitValue');
        const priceValue = document.getElementById('priceValue');
        const progressFill = document.getElementById('progressFill');
        const moneySaved = document.getElementById('moneySaved');
        const totalSmokedElem = document.getElementById('totalSmoked');
        const lifeGained = document.getElementById('lifeGained');
        const nameInput = document.getElementById('nameInput');
        const toast = document.getElementById('toast');

        // ===== УТИЛИТЫ =====
        function showToastMessage(text, duration = 2000) {
            toast.textContent = text;
            toast.classList.add('show');
            setTimeout(() => toast.classList.remove('show'), duration);
        }

        // ===== ЗАГРУЗКА ДАННЫХ =====
        async function loadData() {
            // Загружаем из облака Telegram
            try {
                const cloudData = await tg.CloudStorage.getItem('smokeAppData');
                if (cloudData) {
                    appData = { ...appData, ...JSON.parse(cloudData) };
                }
            } catch (e) {
                const localData = localStorage.getItem('smokeAppData');
                if (localData) {
                    appData = { ...appData, ...JSON.parse(localData) };
                }
            }

            updateAllUI();
            startTimerIfNeeded();
            greetingText.textContent = `Удачи сегодня, ${appData.userName}!`;
        }

        async function saveData(showMessage = false) {
            const dataToSave = JSON.stringify(appData);
            localStorage.setItem('smokeAppData', dataToSave);
            
            try {
                await tg.CloudStorage.setItem('smokeAppData', dataToSave);
                if (showMessage) showToastMessage('✅ Сохранено');
            } catch (e) {
                if (showMessage) showToastMessage('⚠️ Сохранено локально');
            }
        }

        // ===== ОБНОВЛЕНИЕ UI =====
        function updateAllUI() {
            userNameSpan.textContent = appData.userName;
            nameInput.value = appData.userName;
            counter.textContent = appData.count;
            limitDisplay.textContent = `/ ${appData.limit}`;
            limitValue.textContent = appData.limit;
            priceValue.textContent = appData.packPrice;
            
            const progress = (appData.count / appData.limit) * 100;
            progressFill.style.width = `${Math.min(progress, 100)}%`;
            
            updateSavings();
        }

        function updateSavings() {
            const total = appData.totalSmoked + appData.count;
            const pricePerCig = appData.packPrice / 20;
            const savedMoney = Math.round(total * pricePerCig);
            const savedLife = Math.round(total * 0.18 * 10) / 10;

            moneySaved.textContent = `${savedMoney} ₽`;
            totalSmokedElem.textContent = total;
            lifeGained.textContent = savedLife;
        }

        // ===== ТАЙМЕР =====
        function startTimerIfNeeded() {
            if (appData.lastSmokeTime) {
                updateTimer();
                if (!timerInterval) {
                    timerInterval = setInterval(updateTimer, 1000);
                }
            }
        }

        function updateTimer() {
            if (!appData.lastSmokeTime) {
                timerDisplay.textContent = '00:00:00';
                timerStatus.textContent = 'Нажмите +1 для старта';
                return;
            }

            const diff = Math.floor((Date.now() - appData.lastSmokeTime) / 1000);
            const hours = Math.floor(diff / 3600);
            const minutes = Math.floor((diff % 3600) / 60);
            const seconds = diff % 60;

            timerDisplay.textContent = 
                `${String(hours).padStart(2, '0')}:${String(minutes).padStart(2, '0')}:${String(seconds).padStart(2, '0')}`;

            if (diff < 3600) timerStatus.textContent = '🔥 Держитесь!';
            else if (diff < 7200) timerStatus.textContent = '💪 Хороший прогресс!';
            else timerStatus.textContent = '✨ Отлично!';

            if (diff === 7200) {
                tg.showPopup({
                    title: '🎉 Отлично!',
                    message: 'Вы не курите уже 2 часа!',
                    buttons: [{type: 'ok'}]
                });
            }
        }

        function resetTimer() {
            appData.lastSmokeTime = Date.now();
            if (timerInterval) clearInterval(timerInterval);
            timerInterval = setInterval(updateTimer, 1000);
            updateTimer();
            saveData();
            if (tg.HapticFeedback) tg.HapticFeedback.impactOccurred('medium');
        }

        // ===== ДОБАВЛЕНИЕ СИГАРЕТЫ =====
        function addSmoke() {
            appData.count++;
            resetTimer();
            updateAllUI();
            saveData();

            if (tg.HapticFeedback) tg.HapticFeedback.impactOccurred('light');

            if (appData.count === appData.limit) {
                tg.showPopup({
                    title: '⚠️ Внимание',
                    message: 'Вы достигли дневного лимита!',
                    buttons: [{type: 'ok'}]
                });
            } else if (appData.count > appData.limit) {
                tg.showPopup({
                    title: '❌ Превышение',
                    message: `Лимит превышен на ${appData.count - appData.limit} сигарет`,
                    buttons: [{type: 'ok'}]
                });
            }
        }

        // ===== ОБРАБОТЧИКИ СОБЫТИЙ =====
        document.getElementById('addBtn').addEventListener('click', addSmoke);
        
        document.getElementById('resetBtn').addEventListener('click', () => {
            tg.showConfirm('Сбросить счётчик за сегодня?', (confirmed) => {
                if (confirmed) {
                    appData.count = 0;
                    updateAllUI();
                    saveData();
                    showToastMessage('🔄 Счётчик сброшен');
                }
            });
        });

        document.getElementById('saveNameBtn').addEventListener('click', () => {
            const newName = nameInput.value.trim();
            if (newName) {
                appData.userName = newName;
                updateAllUI();
                saveData();
                greetingText.textContent = `Удачи сегодня, ${appData.userName}!`;
                showToastMessage('✅ Имя сохранено');
            }
        });

        document.getElementById('limitMinus').addEventListener('click', () => {
            if (appData.limit > 1) { appData.limit--; updateAllUI(); saveData(); }
        });

        document.getElementById('limitPlus').addEventListener('click', () => {
            if (appData.limit < 100) { appData.limit++; updateAllUI(); saveData(); }
        });

        document.getElementById('priceMinus').addEventListener('click', () => {
            if (appData.packPrice > 10) { appData.packPrice -= 10; updateAllUI(); updateSavings(); saveData(); }
        });

        document.getElementById('pricePlus').addEventListener('click', () => {
            appData.packPrice += 10; updateAllUI(); updateSavings(); saveData();
        });

        document.getElementById('syncBtn').addEventListener('click', () => {
            saveData(true);
            showToastMessage('✅ Данные сохранены');
        });

        document.getElementById('resetAllBtn').addEventListener('click', () => {
            tg.showConfirm('Удалить ВСЕ данные?', (confirmed) => {
                if (confirmed) {
                    appData = { 
                        ...appData, 
                        count: 0, 
                        lastSmokeTime: null, 
                        totalSmoked: 0,
                        limit: 15,
                        packPrice: 200
                    };
                    updateAllUI();
                    saveData();
                    showToastMessage('🗑️ Данные сброшены');
                }
            });
        });

        // Главная кнопка Telegram
        tg.MainButton.text = 'ЗАКРЫТЬ';
        tg.MainButton.show();
        tg.MainButton.onClick(() => tg.close());

        // Запуск
        loadData();
    </script>
</body>
</html>
